<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Portal</title>

    <style>
        /* Reset some default styles */
        body, h1, p, form {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Style the body */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #ffffff, #fb5849);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Style the form container */
        form {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            padding: 30px;
            width: 500px;
            max-width: 100%;
            border: 1px solid #ddd;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        /* Add a subtle scale effect on hover */
        form:hover {
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            transform: translateY(-5px);
        }

        /* Style form elements */
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="number"] {
            width: calc(100% - 22px);
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #fb5849;
            outline: none;
        }

        input[type="submit"] {
            background-color: #fb5849;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #e94e3f;
            transform: translateY(-2px);
        }

        input[type="submit"]:active {
            background-color: #d43f2a;
            transform: translateY(0);
        }

        /* Remove spinner for number inputs */
        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>


</head>
<body>
    <form action="#" method="post">
        {% csrf_token %}
        <label for="">Account Name</label>
        <input type="text" name="account_name" id=""><br><br>

        <label for="">Card Number</label>
        <input type="number" name="card_no" id=""><br><br>

        <label for="">CVV</label>
        <input type="number" name="cvv" id=""><br><br>

        <label for="">MM</label>
        <input type="number" name="MM" id=""><br><br>

        <label for="">YY</label>
        <input type="number" name="YY" id=""><br><br>

        <input type="submit" value="Proceed With Payment"><br><br>
    </form>
</body>
</html>
