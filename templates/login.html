        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #ffffff, #fb5849); /* Updated gradient background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease-out; /* Faster animation */
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #0083b0;
            box-shadow: 0 0 8px rgba(0, 131, 176, 0.4);
            outline: none;
        }
        input[type="submit"] {
            background: linear-gradient(to right, #fb5849, #e04a3e);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.3s ease, transform 0.2s ease;
        }
        input[type="submit"]:hover {
            background: linear-gradient(to right, #e04a3e, #fb5849);
            transform: scale(1.05);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>


</head>
<body>
    <div class="container">
        <h1>Log In</h1>
        <form action="#" method="post" class="form-horizontal">
            {% csrf_token %}

                <div class="form-group">
                    {{ form.username.label_tag }}
                    {{ form.username }}
                </div>

                <div class="form-group">
                    {{ form.password.label_tag }}
                    {{ form.password }}
                </div>

                {% for field in form %}
                    {% if field.errors %}
                        {% for error in field.errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    {% endif %}
                {% endfor %}

            <!-- {{ form.as_p }} -->
            
            <div class="form-actions">
                <input type="submit" value="Log In">
            </div>
        </form>

        <h6 style=" font-size: 14px;">
            Don't have an account?
            <a href="{% url 'register' %}" 
               style="
                   color: #007BFF; /* Default link color */
                   text-decoration: none; /* No underline by default */
                   font-weight: bold; /* Make the link bold */
                   transition: color 0.3s ease, text-decoration 0.3s ease; /* Smooth transition for color and underline */
                   font-family: Arial, sans-serif; /* Ensure font consistency */
                   font-size: 14px; /* Set a readable font size */
               " 
               onmouseover="this.style.textDecoration='underline';"
               onmouseout="this.style.color='#007BFF'; this.style.textDecoration='none';">
                Register Now
            </a>
        </h6>
    </div>
</body>
</html>
